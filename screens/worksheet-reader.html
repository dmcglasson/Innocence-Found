<section class="worksheet-reader-page">
  <img
    class="worksheet-reader-page__bgImg"
    src="./images/worksheets-bg1.png"
    alt=""
    aria-hidden="true"
  />

  <div class="worksheet-reader-page__wrap">
    <article class="worksheet-reader-page__card">
      <button id="backToWorksheetsBtn" class="worksheet-reader-page__backBtn" type="button">
        &larr; Back to Worksheets
      </button>

      <h1 id="worksheetTitle" class="worksheet-reader-page__title">Worksheet</h1>

      <div id="worksheetBody" class="worksheet-reader-page__body" aria-live="polite">
        <p>Loading worksheet...</p>
      </div>
    </article>
  </div>
</section>
