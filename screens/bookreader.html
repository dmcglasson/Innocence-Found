<main class="background-area">
  <div class="book-container">
    <div class="book-selector">
      <label for="bookSelect">Choose a book:</label>
      <select id="bookSelect">
        <option value="" selected disabled>Loading available chapters...</option>
      </select>
    </div>

    <div class="reader-view-controls" role="group" aria-label="Reader view mode">
      <span class="reader-view-label">View:</span>
      <button id="doublePageViewBtn" type="button" class="reader-view-btn">Double page</button>
      <button id="singlePageViewBtn" type="button" class="reader-view-btn">Single page</button>
    </div>

    <section class="reader-shell" aria-label="Book reader">
      <p id="readerError" class="reader-error hidden" role="alert"></p>

      <div class="book" id="bookFrame">
        <div class="page left-page">
          <canvas id="leftPage"></canvas>
        </div>
        <div class="page right-page">
          <canvas id="rightPage"></canvas>
        </div>
      </div>
    </section>

    <div class="controls">
      <button id="prevPage">Previous</button>
      <span id="pageInfo">Page 1-2</span>
      <button id="nextPage">Next</button>
      <button id="jumpToDiscussion" type="button" class="ghost-btn jump-discussion">
        Jump to discussion
      </button>
    </div>

    <section class="poll-panel" aria-labelledby="pollTitle">
      <div class="poll-header">
        <p class="eyebrow">Author question</p>
        <h3 id="pollTitle" class="poll-title">Reader Poll</h3>
        <p id="pollQuestion" class="poll-question">
          Choose the answer that best matches your perspective.
        </p>
      </div>

      <fieldset id="pollOptions" class="poll-options">
        <!-- Poll options are rendered by bookreader.js -->
      </fieldset>

      <div class="poll-actions">
        <button id="submitPollVote" type="button">Submit vote</button>
        <p id="pollStatus" class="poll-status" aria-live="polite"></p>
      </div>
    </section>

    <section class="comments-panel" aria-labelledby="commentsTitle">
      <div class="comments-header">
        <div>
          <p class="eyebrow">Chapter comments</p>
          <h3 id="commentsTitle" class="comments-title">Book 1 - Section</h3>
          <p id="commentsMeta" class="comments-meta">All pages</p>
        </div>
        <div class="comment-controls">
          <label for="filterComments" class="sr-only">Sort comments</label>
          <select id="filterComments">
            <option value="desc">Newest first</option>
            <option value="asc">Oldest first</option>
            <option value="popular">Most replies</option>
          </select>
          <button id="refreshComments" type="button" class="ghost-btn">Refresh</button>
        </div>
      </div>

      <div id="commentsList" class="comments-list"></div>
      <div id="commentsError" class="empty-state hidden" role="alert"></div>
      <div id="noComments" class="empty-state hidden">
        No comments yet for this section. Be the first to start the thread.
      </div>
      <div id="subscriberNotice" class="subscriber-notice hidden">
        Only subscribers can post or reply to comments.
      </div>
      <div id="newCommentArea" class="comment-compose">
        <label for="newCommentText">Add a comment</label>
        <textarea
          id="newCommentText"
          rows="3"
          placeholder="Share your thoughts on this section..."
        ></textarea>
        <button id="submitComment" type="button">Post comment</button>
      </div>
    </section>
  </div>
</main>
