<div class="admin-layout">

  <aside class="admin-sidebar">
    <div class="admin-menu-card">
      <h3>Menu</h3>
      <button type="button" class="admin-menu-btn" data-page="chapters">Books & Chapters</button>
      <button type="button" class="admin-menu-btn" data-page="worksheets">Worksheets</button>
      <button type="button" class="admin-menu-btn" data-page="admin-dashboard">Users</button>
      <button type="button" class="admin-menu-btn" data-page="subscribe">Subscriptions</button>
      <button type="button" class="admin-menu-btn" data-page="admin-upload">Upload Documents</button>
    </div>
  </aside>

  <section class="admin-main">
    <div>
      <div class="admin-panel__header">
        <h1>View Reader Responses</h1>
        <p>Select a chapter to view submitted responses.</p>
      </div>

      <div class="admin-controls">
        <label for="chapterSelect" class="admin-controls__label">Chapter</label>

        <div class="admin-select-wrap custom-dropdown" id="chapterDropdown">
          <button type="button" class="admin-select custom-dropdown__trigger" id="chapterDropdownTrigger">
            Choose a chapter
          </button>

          <div class="custom-dropdown__menu" id="chapterDropdownMenu"></div>

          <select id="chapterSelect" class="admin-select custom-dropdown__native" aria-hidden="true" tabindex="-1">
            <option value="">Choose a chapter</option>
          </select>
        </div>
      </div>

      <p id="adminResponsesMessage" class="admin-message" aria-live="polite"></p>

      <div id="responsesContainer" class="admin-table-wrap">
        <div class="admin-empty-state">
          No chapter selected yet.
        </div>
      </div>

    </div>
  </section>

</div>
