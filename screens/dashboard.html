<div class="content-section">
  <div class="auth-box">
    <h1>Welcome, <span id="userName"></span></h1>
    <p class="subtitle">You are successfully logged in</p>

    <div class="user-info">
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
    </div>

    <button class="btn btn-secondary" id="logoutBtn">Sign Out</button>

    <hr />

    <h2>Change Password</h2>

    <form id="changePasswordForm">
      <div class="form-group">
        <label for="currentPassword">Current Password</label>
        <input
          type="password"
          id="currentPassword"
          required
        />
      </div>

      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input
          type="password"
          id="newPassword"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirmNewPassword">Confirm New Password</label>
        <input
          type="password"
          id="confirmNewPassword"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary">
        Update Password
      </button>

      <p id="passwordMessage"></p>
    </form>
  </div>
</div>

<hr />

<h2>Worksheets</h2>

<div id="worksheetsContainer">
  <p>Loading worksheets...</p>
</div>

<hr />

<h2>Admin Upload Worksheet</h2>

<form id="uploadWorksheetForm" enctype="multipart/form-data">

  <div class="form-group">
    <label for="worksheetTitle">Title</label>
    <input type="text" id="worksheetTitle" required />
  </div>

  <div class="form-group">
    <label for="worksheetDescription">Description</label>
    <input type="text" id="worksheetDescription" required />
  </div>

  <div class="form-group">
    <label for="worksheetFile">PDF File</label>
    <input type="file" id="worksheetFile" accept="application/pdf" required />
  </div>

  <button type="submit" class="btn btn-primary">
    Upload Worksheet
  </button>

  <p id="uploadMessage"></p>

</form>
