<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net http://localhost:3001 http://127.0.0.1:3001; object-src 'none'; base-uri 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- Note: X-Frame-Options and frame-ancestors must be set via HTTP headers, not meta tags -->
    <title>Innocence Found</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav class="nav">
            <a href="#" class="brand" data-page="home">
            <img src="images/logo.png" alt="Innocence Found logo">
            </a>

            <h1 class="site-title">Innocence Found</h1>

            <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#" data-page="home">Home</a></li>
                <li><a href="#" data-page="about">About</a></li>
                <li><a href="#" data-page="contact">Contact</a></li>
                <li id="authNavItem">
                <a href="#" data-page="login" id="loginNavLink">Login</a>
                </li>
            </ul>

            <div class="user-menu" id="userMenu" style="display: none;">
                <a href="#" data-page="dashboard">Dashboard</a>
                <a href="#" data-page="admin">Admin</a>
                <a href="#" data-page="profile">Profile</a>
                <span id="userNameNav"></span>
                <a href="#" id="logoutLink">Sign Out</a>
            </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="pageContainer" class="page active">
            <!-- Screens will be loaded here dynamically -->
        </div>
    </main>

    <footer>
        <p>&copy; <span id="footerYear"></span> Innocence Found. All rights reserved.</p>
    </footer>

    <!-- Supabase JS Client Library (must load before app so window.supabase exists) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
    // NOTE:
    // Do not commit real Supabase credentials here.
    // This stub defines the expected shape of window.ENV and should be
    // overridden by env-loader.js or by your hosting platform at deploy time.
    window.ENV = window.ENV || {
      SUPABASE_URL: "YOUR_SUPABASE_URL_HERE",
      SUPABASE_ANON_KEY: "YOUR_SUPABASE_ANON_KEY_HERE"
    };
    </script>

    <!-- Set environment variables (load from .env or set here for local dev) -->
    <!-- For production, set these via your hosting platform's environment variables -->

    <!-- Load environment variables and initialize app -->
    <script type="module">
        import { initEnv } from './js/utils/env-loader.js';

        // Load environment variables first
        await initEnv();

        // Then load main application
        await import('./js/main.js');
    </script>
</body>

</html>
