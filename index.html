<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; frame-src 'self' blob:; object-src 'none'; base-uri 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <!-- Note: X-Frame-Options and frame-ancestors must be set via HTTP headers, not meta tags -->
    <title>Innocence Found</title>
    <link rel="icon" href="images/logo.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav class="nav">
            <a href="#home" class="brand" data-page="home">
                <img src="images/logo.png" alt="Innocence Found logo">
            </a>

            <h1 class="site-title">Innocence Found</h1>
    

            <button class="nav-toggle" id="navToggle" aria-label="Open navigation menu" aria-expanded="false"
                aria-controls="navRight" type="button">
                ☰
            </button>

            <div class="nav-right" id="navRight">
                <ul class="nav-links">
                    <li><a href="#home" data-page="home">Home</a></li>
                    <li><a href="#about" data-page="about">About</a></li>
                    <li><a href="#contact" data-page="contact">Contact</a></li>
                    <li><a href="#admin-dashboard" data-page="admin-dashboard">Admin</a></li>
                    <li id="authNavItem">
                        <a href="#login" data-page="login" id="loginNavLink">Login</a>
                    </li>
                </ul>

                <div class="user-menu" id="userMenu" style="display: none;">
                    <span id="userNameNav"></span>
                    <a href="#profile" data-page="profile">Profile</a>
                    <a href="#" id="logoutLink">Sign Out</a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="pageContainer" class="page active">
            <!-- Screens will be loaded here dynamically -->
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Innocence Found. All rights reserved.</p>
    </footer>

    <!-- Supabase JS Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Public client runtime configuration -->
    <script src="./env.js"></script>


    <!-- Load environment variables and initialize app -->
    <script type="module">
        import { initEnv } from './js/utils/env-loader.js';

        // Load environment variables first
        await initEnv();

        // Then load main application
        await import('./js/main.js');
    </script>
</body>

</html>
