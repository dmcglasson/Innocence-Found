<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Updated CSP (allows cdn.jsdelivr.net connections) -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                 script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
                 style-src 'self' 'unsafe-inline';
                 img-src 'self' data: https:;
                 font-src 'self' data:;
                 connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net;" />

  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <title>Innocence Found</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header id="siteHeader">
    <nav>
      <a href="#home" class="logo" data-page="home">Innocence Found</a>

      <ul class="nav-links">
        <li><a href="#home" data-page="home">Home</a></li>
        <li><a href="#about" data-page="about">About</a></li>
        <li><a href="#contact" data-page="contact">Contact</a></li>
        <li id="authNavItem">
          <a href="#login" data-page="login" id="loginNavLink">Login</a>
        </li>
      </ul>

      <div class="user-menu" id="userMenu" style="display: none;">
    <span id="userNameNav"></span>

    <span id="subscriberBadge" style="display:none; margin-left:10px; font-size:12px; background:#6b3f2d; color:white; padding:4px 8px; border-radius:12px;">
        Subscriber Active
    </span>

    <a href="#" id="logoutLink">Sign Out</a>
      </div>
    </nav>
  </header>

  <main>
    <div id="pageContainer" class="page active">
      <!-- Screens will be loaded here dynamically -->
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Innocence Found. All rights reserved.</p>
  </footer>

  <!-- Supabase JS Client Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>


<script type="module">
    await import('./js/main.js');
</script>
</body>
</html>
