<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Innocence Found — Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Crimson+Text:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --cedar:#6b3f2d;
      --caramel:#b46b33;
      --coffee:#7a5b45;
      --sage:#9ba68b;
      --parchment:#f3e7d7;
      --ink:#2b2b2b;
      --accent:#a11d1d;
      --card:#fffaf1;
      --shadow: 0 10px 30px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
      --radius: 18px;
      --max: 1100px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Crimson Text", serif;
      background: var(--parchment);
      color: var(--ink);
      overflow-x: hidden;
    }

    .wrap{max-width:var(--max); margin:auto; padding:20px;}
    .row{display:flex; align-items:center; gap:12px}

    header{
      position:sticky; top:0;
      background:#fffaf6;
      border-bottom:1px solid rgba(0,0,0,.05);
      z-index:100;
    }

    .headbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand{
      font-family:"Abril Fatface";
      font-size:24px;
      color:var(--cedar);
    }

    /* NAV */
    .menu-toggle{
      display:none;
      font-size:24px;
      cursor:pointer;
    }

    nav{
      display:flex;
      gap:12px;
    }

    nav a{
      text-decoration:none;
      font-family:Inter;
      color:var(--ink);
      padding:8px;
      border-radius:8px;
    }

    nav .cta{
      background:var(--cedar);
      color:white;
    }

    /* HERO */
    .hero{
      text-align:center;
      padding:60px 20px;
    }

    .hero h1{
      font-size:40px;
      color:var(--cedar);
    }

    .lead{
      font-size:18px;
    }

    .btn{
      padding:10px 16px;
      border:none;
      border-radius:10px;
      margin:10px;
      cursor:pointer;
      min-height:44px;
    }

    .primary{background:var(--cedar); color:white;}
    .ghost{border:2px solid var(--cedar); background:none;}

    /* FEATURES */
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .feature{
      background:var(--card);
      padding:20px;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    footer{
      background:#2c201a;
      color:white;
      padding:20px;
      text-align:center;
    }

    /* MOBILE FIX */
    @media(max-width:720px){
      .menu-toggle{display:block;}

      nav{
        display:none;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:20px;
        background:white;
        padding:15px;
        border-radius:10px;
        box-shadow:var(--shadow);
      }

      nav.show{
        display:flex;
      }

      .hero h1{
        font-size:28px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="wrap headbar">
    <div class="brand">Innocence Found</div>

    <div class="menu-toggle" id="menuToggle">☰</div>

    <nav id="navLinks">
      <a href="#chapters">Chapters</a>
      <a href="#worksheets">Worksheets</a>
      <a href="#readers">Readers</a>
      <a href="#about">About</a>
      <a class="cta" href="#subscribe">Login</a>
    </nav>
  </div>
</header>

<main>

<section class="hero">
  <h1>Wholesome Stories for Curious Minds</h1>
  <p class="lead">Explore chapters, worksheets, and a safe reading space.</p>
  <button class="btn primary">Read Now</button>
  <button class="btn ghost">Try Worksheets</button>
</section>

<section class="grid">
  <div class="feature">📖 Chapters</div>
  <div class="feature">📝 Worksheets</div>
  <div class="feature">💬 Reader’s Corner</div>
</section>

<section class="hero">
  <h2>Join Our Community</h2>
  <button class="btn primary">Subscribe</button>
</section>

</main>

<footer>
  © <span id="year"></span> Innocence Found
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const toggle = document.getElementById("menuToggle");
const nav = document.getElementById("navLinks");

toggle.addEventListener("click", () => {
  nav.classList.toggle("show");
});
</script>

</body>
</html>
